name: Catroid Main Workflow

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "develop"
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight
  workflow_dispatch:
    inputs:
      WEB_TEST_URL:
        description: "When set, all the archived APKs will point to this Catrobat web server, useful for testing web changes. E.g https://web-test.catrob.at"
        required: false
        type: string
        default: ""
      BUILD_ALL_FLAVOURS:
        description: "When selected all flavours are built and archived as artifacts that can be installed alongside other versions of the same APKs"
        required: false
        type: boolean
        default: false

env:
  # Java version for the JDK setup
  JAVA_VERSION: 21

jobs:

  repo-check:
    if: ${{ github.repository == 'Catrobat/Catroid' }}
    # set --env GITHUB_REPOSITORY=Catrobat/Catroid for local runs in act since env.ACT is not accessible here
    name: Repo Check
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow was triggered in the ${{ github.repository }} repo!"

  build:
    needs: repo-check
    name: Build APK
    runs-on: ubuntu-latest
    env:
      WEB_TEST_URL: ${{ inputs.WEB_TEST_URL != '' && format('-PwebTestUrl=''{0}''', inputs.WEB_TEST_URL) || '' }}
      ALL_FLAVOURS_PARAMETERS: ${{ inputs.BUILD_ALL_FLAVOURS && 'assembleCreateAtSchoolDebug assembleLunaAndCatDebug assemblePhiroDebug assembleEmbroideryDesignerDebug assemblePocketCodeBetaDebug assembleMindstormsDebug' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        if: ${{ env.ACT }} # Only run on local act setups, as GitHub Actions provides the Android SDK on Ubuntu
        uses: android-actions/setup-android@v2

      - name: Build APK
        run: ./gradlew ${{ env.WEB_TEST_URL }} -Pindependent='#${{ github.run_number }} ${{ github.ref_name }}' assembleCatroidDebug ${{ env.ALL_FLAVOURS_PARAMETERS }}


  unit-tests:
    needs: repo-check
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      repository-projects: write
      checks: write
    env:
      WEB_TEST_URL: ${{ inputs.WEB_TEST_URL != '' && format('-PwebTestUrl=''{0}''', inputs.WEB_TEST_URL) || '' }}
      ALL_FLAVOURS_PARAMETERS: ${{ inputs.BUILD_ALL_FLAVOURS && 'assembleCreateAtSchoolDebug assembleLunaAndCatDebug assemblePhiroDebug assembleEmbroideryDesignerDebug assemblePocketCodeBetaDebug assembleMindstormsDebug' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew -PenableCoverage jacocoTestCatroidDebugUnitTestReport --continue --full-stacktrace

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: (success() || failure()) && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        with:
          name: Unit Tests
          path: catroid/build/test-results/**/*TEST*.xml
          reporter: java-junit

      - name: Upload Unit Test Reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: unit-test-report
          path: |
            catroid/build/reports/tests/testCatroidDebugUnitTest

      - name: Stage JaCoCo Coverage XML for SonarQube
        if: success() || failure()
        run: |
          mkdir -p coverage-xml-unit-tests
          # Find any Jacoco XML report for the unit tests and stage it as report.xml
          if [ -d "catroid/build/reports/jacoco" ]; then
            find catroid/build/reports/jacoco -name "*.xml" -exec cp {} coverage-xml-unit-tests/report.xml \;
          else
            echo "::warning::JaCoCo report directory not found — coverage XML will not be available"
          fi

      - name: Upload JaCoCo Coverage XML
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-xml-unit-tests
          path: coverage-xml-unit-tests/report.xml
          if-no-files-found: warn

  code-analysis:
    needs: repo-check
    name: Code Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - { name: "pmd", sarif: false }
          - { name: "checkstyle", sarif: true }
          - { name: "detekt", sarif: true }
          - { name: "lint", sarif: true }
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ${{ matrix.tool.name }} Analysis
        run: |
          case ${{ matrix.tool.name }} in
            "pmd") ./gradlew pmd ;;
            "checkstyle") ./gradlew checkstyle ;;
            "detekt") ./gradlew detekt ;;
            "lint") ./gradlew lintCatroidDebug ;;
          esac

      - name: Upload ${{ matrix.tool.name }} SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ matrix.tool.sarif && (success() || failure()) }}
        with:
          sarif_file: catroid/build/reports/${{ matrix.tool.name }}.sarif
          category: ${{ matrix.tool.name }}

      - name: Upload ${{ matrix.tool.name }} HTML Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: ${{ matrix.tool.name }}-report
          path: |
            catroid/build/reports/html/${{ matrix.tool.name }}.html

  instrumented-unit-tests:
    needs: repo-check
    name: Instrumented Unit Tests
    uses: ./.github/workflows/emulated_tests.yml
    with:
      gradle-test-config: org.catrobat.catroid.testsuites.LocalHeadlessTestSuite
      calling-job: instrumented-unit-tests

  testrunner-tests:
    needs: repo-check
    name: Testrunner Tests
    uses: ./.github/workflows/emulated_tests.yml
    with:
      gradle-test-config: org.catrobat.catroid.catrobattestrunner.CatrobatTestRunner
      calling-job: testrunner-tests

  quarantined-tests:
    needs: repo-check
    name: Quarantined Tests
    uses: ./.github/workflows/emulated_tests.yml
    with:
      gradle-test-config: org.catrobat.catroid.testsuites.UiEspressoQuarantineTestSuite
      calling-job: quarantined-tests

  rtl-tests:
    needs: repo-check
    name: RTL Tests
    uses: ./.github/workflows/emulated_tests.yml
    with:
      gradle-test-config: org.catrobat.catroid.testsuites.UiEspressoRtlTestSuite
      calling-job: rtl-tests

  sonarqube:
    needs: [unit-tests, instrumented-unit-tests, testrunner-tests, quarantined-tests, rtl-tests]
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        if: ${{ env.ACT }} # Only run on local act setups, as GitHub Actions provides the Android SDK on Ubuntu
        uses: android-actions/setup-android@v2

      - name: Download Unit Test Coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-unit-tests
          path: coverage-reports/coverage-xml-unit-tests
        continue-on-error: true

      - name: Download Instrumented Unit Test Coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-instrumented-unit-tests
          path: coverage-reports/coverage-xml-instrumented-unit-tests
        continue-on-error: true

      - name: Download Testrunner Test Coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-testrunner-tests
          path: coverage-reports/coverage-xml-testrunner-tests
        continue-on-error: true

      - name: Download Quarantined Test Coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-quarantined-tests
          path: coverage-reports/coverage-xml-quarantined-tests
        continue-on-error: true

      - name: Download RTL Test Coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-rtl-tests
          path: coverage-reports/coverage-xml-rtl-tests
        continue-on-error: true

      - name: Collect Coverage XML Paths
        shell: bash
        run: |
          COVERAGE_FILES=()

          while IFS= read -r -d '' file; do
            COVERAGE_FILES+=("$file")
          done < <(find coverage-reports -name report.xml -print0 2>/dev/null)

          if [ -f "coverage-reports/coverage-xml-unit-tests/report.xml" ]; then
            COVERAGE_FILES+=("coverage-reports/coverage-xml-unit-tests/report.xml")
          fi

          if [ ${#COVERAGE_FILES[@]} -eq 0 ]; then
            echo "::warning::No coverage XML files were found for SonarQube analysis"
            echo "SONAR_COVERAGE_PATHS=" >> "$GITHUB_ENV"
            exit 0
          fi

          printf 'Coverage XML files detected:\n'
          printf ' - %s\n' "${COVERAGE_FILES[@]}"

          CLEAN_PATHS=$(printf '%s\n' "${COVERAGE_FILES[@]}" | sort -u | paste -sd, -)
          echo "SONAR_COVERAGE_PATHS=$CLEAN_PATHS" >> "$GITHUB_ENV"

      - name: Compile Sources
        run: ./gradlew compileCatroidDebugSources

      - name: Run SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_COVERAGE_PATHS: ${{ env.SONAR_COVERAGE_PATHS }}
        run: |
          if [ -z "$SONAR_COVERAGE_PATHS" ]; then
            echo "::warning::Skipping JaCoCo import because no coverage XML files were collected"
          fi

          ./gradlew sonar --info \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.projectKey=Catrobat_Catroid \
            -Dsonar.organization=catrobat
